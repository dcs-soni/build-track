# PR Validation Workflow
# Ensures all PRs meet quality standards before merge

name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================================
  # Validate PR Title follows Conventional Commits
  # ============================================================================
  validate-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            must not start with an uppercase character.
          ignoreLabels: |
            bot
            ignore-semantic

  # ============================================================================
  # Check for breaking changes in PRs to main
  # ============================================================================
  breaking-changes:
    name: Breaking Changes Check
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for breaking changes marker
        run: |
          if git log --oneline origin/main..HEAD | grep -i "BREAKING CHANGE"; then
            echo "::warning::This PR contains breaking changes. Ensure they are documented."
          fi

  # ============================================================================
  # Validate PR size
  # ============================================================================
  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          ADDITIONS=$(gh pr view ${{ github.event.pull_request.number }} --json additions -q '.additions')
          DELETIONS=$(gh pr view ${{ github.event.pull_request.number }} --json deletions -q '.deletions')
          TOTAL=$((ADDITIONS + DELETIONS))
          
          echo "Total changes: $TOTAL lines"
          
          if [ $TOTAL -gt 1000 ]; then
            echo "::warning::Large PR detected ($TOTAL lines). Consider breaking it into smaller PRs."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Check for required files updates
  # ============================================================================
  required-files:
    name: Required Files Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for README updates on major changes
        run: |
          # Get changed files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          
          # Check if src files changed but no docs updated
          if echo "$CHANGED_FILES" | grep -q "apps/\|packages/" ; then
            if ! echo "$CHANGED_FILES" | grep -qE "README|\.md$"; then
              echo "::notice::Consider updating documentation for code changes."
            fi
          fi

  # ============================================================================
  # Label PR based on changes
  # ============================================================================
  labeler:
    name: Auto Label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Label PR
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
        continue-on-error: true
